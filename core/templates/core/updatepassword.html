{% extends "core/base.html" %}

{% block title %}<title>Update Password</title>{% endblock %}

{% block content %}
<center><h3>{{ message }}</h3></center>
{% if error %}
<center><h3 style="color: #8a2be2;">{{ error }}</h3></center>
{% endif %}
<form method="post" action="{% url 'core:updatepassword' %}" class="add-ticket-form">
    <div class="form-group" id="ticket_upload_options" style="visibility: visible;">
    {% csrf_token %}
    <label for="current_password">Current Password</label>
    <input type="password" id="current_password" name="current_password" required>
    <label for="new_password">New Password</label>
    <input type="password" id="new_password" name="new_password" required>
    </div>
    <br>
    <center>
    <button type="submit" class="download_pdf">Update Password</button>
    </center>
</form> 
{% endblock %}
