{% extends 'core/base.html' %}
{% load static %}
{% block title %}
<title>Add Ticket</title>
  {% endblock %}
{% block addJS %}
<script src="{% static 'add_ticket.js' %}"></script>
{% endblock %}
{% block content %}
  <section class="add-ticket-section">
    <center>
    <h1 class="add-ticket-title">Add A New Ticket</h1>
    </center>
    <!-- <form method="post" action="{% url 'core:create_ticket' %}" class="add-ticket-form"> -->
    <form method="post" action="{% url 'core:save_ticket' %}" class="add-ticket-form" enctype="multipart/form-data">
      {% csrf_token %}
      <section class="ticket-pdf-upload">
        <div class="form-group">
          <label for="ticket_pdf_label">Upload Ticket PDF:</label>
          <input type="file" id="ticket_pdf" name="ticket_pdf" accept="application/pdf" required>
          <br>
        </div>
        <!-- <center>
        <a href="{% url 'core:process_ticket_pdf' %}">
          <button type="submit" id="process_pdf_btn" class="btn-process-pdf">Confirm Ticket</button>
        </a>
        </center> -->
       </section>
      <div class="form-group" id = "ticket_upload_options" style="visibility: visible;">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br>
        <label for="source">Source:</label>
        <input type="text" id="source" name="source" required><br>
        <label for="destination">Destination:</label>
        <input type="text" id="destination" name="destination" required><br>
        <label for="ticket_type">Ticket Type:</label>
        <select name="ticket_type_dropdown" id="ticket_type_dropdown" required>
            <option value="flight">Flight</option>
            <option value="train">Train</option>
            <option value="bus">Bus</option>
            <option value="ferry">Ferry</option>
            <option value="other">Other</option>
        </select><br>
        <label for="booked_through">Booked Through:</label>
        <input type="text" id="booked_through" name="booked_through" required><br>
        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="4" required></textarea><br>
        <label for="date_of_journey">Date of Journey:</label>
        <input type="date" id="date_of_journey" name="date_of_journey" required><br>
        <label for="amount_paid">Amount Paid:</label>
        <div class="amount-currency-row">
          <input type="number" value="0.00" id="amount_paid" name="amount_paid" max="10000000" placeholder="Amount Paid" required>
          <select name="currency" id="currency">
            <option value="INR" selected>INR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="AUD">AUD</option>
            <option value="CAD">CAD</option>
            <option value="JPY">JPY</option>
            <option value="CNY">CNY</option>
            <option value="SGD">SGD</option>
            <option value="CHF">CHF</option>
            <option value="NZD">NZD</option>
            <option value="ZAR">ZAR</option>
            <option value="SEK">SEK</option>
            <option value="NOK">NOK</option>
            <option value="DKK">DKK</option>
            <option value="BRL">BRL</option>
            <option value="MXN">MXN</option>
            <option value="RUB">RUB</option>
            <option value="HKD">HKD</option>
            <option value="KRW">KRW</option>
            <option value="AED">AED</option>
            <option value="ARS">ARS</option>
            <option value="BDT">BDT</option>
            <option value="BGN">BGN</option>
            <option value="BHD">BHD</option>
            <option value="BND">BND</option>
            <option value="BOB">BOB</option>
            <option value="BWP">BWP</option>
            <option value="BYN">BYN</option>
            <option value="CLP">CLP</option>
            <option value="COP">COP</option>
            <option value="CRC">CRC</option>
            <option value="CZK">CZK</option>
            <option value="DOP">DOP</option>
            <option value="EGP">EGP</option>
            <option value="ETB">ETB</option>
            <option value="GHS">GHS</option>
            <option value="GTQ">GTQ</option>
            <option value="HUF">HUF</option>
            <option value="IDR">IDR</option>
            <option value="ILS">ILS</option>
            <option value="IQD">IQD</option>
            <option value="IRR">IRR</option>
            <option value="JOD">JOD</option>
            <option value="KES">KES</option>
            <option value="KWD">KWD</option>
            <option value="KZT">KZT</option>
            <option value="LAK">LAK</option>
            <option value="LKR">LKR</option>
            <option value="MAD">MAD</option>
            <option value="MDL">MDL</option>
            <option value="MXV">MXV</option>
            <option value="MNT">MNT</option>
            <option value="MUR">MUR</option>
            <option value="MVR">MVR</option>
            <option value="MWK">MWK</option>
            <option value="MYR">MYR</option>
            <option value="NGN">NGN</option>
            <option value="NPR">NPR</option>
            <option value="OMR">OMR</option>
            <option value="PAB">PAB</option>
            <option value="PEN">PEN</option>
            <option value="PHP">PHP</option>
            <option value="PKR">PKR</option>
            <option value="PLN">PLN</option>
            <option value="PYG">PYG</option>
            <option value="QAR">QAR</option>
            <option value="RON">RON</option>
            <option value="RSD">RSD</option>
            <option value="SHP">SHP</option>
            <option value="SOS">SOS</option>
            <option value="SRD">SRD</option>
            <option value="SYP">SYP</option>
            <option value="THB">THB</option>
            <option value="TND">TND</option>
            <option value="TRY">TRY</option>
            <option value="TTD">TTD</option>
            <option value="TWD">TWD</option>
            <option value="UAH">UAH</option>
            <option value="UGX">UGX</option>
            <option value="UYU">UYU</option>
            <option value="UZS">UZS</option>
            <option value="VND">VND</option>
            <option value="VUV">VUV</option>
          </select>
        </div>

      </div>
        <br>
        <center>
        <button type="submit" id="save_ticket_btn" class="btn-save-ticket">Save Ticket</button>
        </center>
    

{% endblock %}
