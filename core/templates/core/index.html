{% extends 'core/base.html' %}

{% block content %}
  <section class="hero">
    <h1 class="hero-title">Everything about your travels</h1>
    <p class="hero-sub">Save Tickets and Reservations in a single place. Get a Glance at Your Spendings</p>
    <div class="hero-actions">
      {% if user.is_authenticated %}
        <a href="{% url 'core:dashboard' %}" class="btn-signup">Dashboard</a>
      {% else %}
        <a href="/signup/" class="btn-signup">SIGN UP</a>
      {% endif %}
      <a href="{% url 'core:about_triprep' %}" class="btn-signup">What Are We</a>
    </div>
  </section>
{% endblock %}
